  results:
    - submission_file: submissions/catboost_xgboost_50_50_threshold_0130.csv
      public_score: 0.8832
    - submission_file: submissions/autogluon_v3_extreme_threshold_0117.csv
      public_score: 0.9112
    - submission_file: submissions/manual_lightgbmprep_r31_threshold_0117.csv
      public_score: 0.9023

artifact_references:
  tracked_documentation:
    - docs/benchmarks/autogluon.md
    - docs/benchmarks/kaggle_submissions.csv
  local_ignored_dependencies:
    - path: data/raw
      purpose: Competition source data.
    - path: data/interim
      purpose: EDA-derived feature metadata.
    - path: data/processed
      purpose: Implemented versioned Parquet datasets.
    - path: artifacts/experiments
      purpose: Standard-model, threshold, feature-importance, and blend artifacts.
    - path: artifacts/autogluon
      purpose: AutoGluon predictors and model files.
    - path: artifacts/reference/autogluon_lightgbmprep_r31
      purpose: AutoGluon reference OOF and test probabilities required by the manual reproduction.
    - path: notebooks/sandbox
      purpose: Experimental notebook source, including the manual LightGBM reproduction.
    - path: submissions
      purpose: Saved historical submission files.

numerical_tolerances:
  submission_labels: exact
  row_counts: exact
  raw_data_hashes: exact
  feature_names: exact
  feature_order: exact
  deterministic_metric_absolute_tolerance_current_environment: 0.000001
  cross_environment_policy: A wider tolerance may be required across hardware, drivers, or dependency versions and must be documented before use.

known_limitations:
  - Global OOF threshold optimization is optimistic.
  - The existing cross-fitted threshold method is historical and not fully nested.
  - Standard experiments repeatedly reuse the same five-fold split with seed 42.
  - Processed row identity depends on preserved order rather than a persistent entity ID.
  - Important data, artifacts, sandbox notebooks, and submissions are ignored local dependencies.
  - Manual LightGBM OOF predictions, test probabilities, fold metrics, encoder state, and models are not currently persisted.
  - AutoGluon extreme dependencies and downloaded model assets are not completely reconstructable from the tracked requirements file.
  - The project has no implemented automated test suite.
  - Configuration and script entry-point files are placeholders.
  - The repository currently relies on nonstandard src.churn_ml imports and notebook sys.path mutation.
