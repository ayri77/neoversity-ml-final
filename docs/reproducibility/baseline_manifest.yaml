    test_row_count: 2500
    feature_count: 205
    expected_row_order_preservation: exact
    defining_transformations:
      type: drop_columns
      description: Remove the union of constant and all-missing raw features.
      dropped_feature_count: 25
      dropped_features:
        - Var118
        - Var138
        - Var141
        - Var15
        - Var167
        - Var169
        - Var175
        - Var185
        - Var191
        - Var2
        - Var20
        - Var209
        - Var213
        - Var215
        - Var224
        - Var230
        - Var31
        - Var32
        - Var39
        - Var42
        - Var48
        - Var52
        - Var55
        - Var79
        - Var8

  - id: v1_missingness_summary
    status: implemented_local
    path: data/processed/v1_missingness_summary
    parent: v0_raw_minimal
    train_row_count: 10000
    test_row_count: 2500
    feature_count: 213
    expected_row_order_preservation: exact
    defining_transformations:
      type: additive_missingness_summary
      added_features:
        - missing_count_total
        - missing_rate_total
        - missing_count_numeric
        - missing_rate_numeric
        - missing_count_categorical
        - missing_rate_categorical
        - missing_count_very_high
        - missing_rate_very_high

  - id: v2_missingness_indicators
    status: implemented_local
    path: data/processed/v2_missingness_indicators
    parent: v0_raw_minimal
    train_row_count: 10000
    test_row_count: 2500
    feature_count: 393
    expected_row_order_preservation: exact
    defining_transformations:
      type: additive_broad_missingness_indicators
      summary_feature_count: 4
      summary_features:
        - missing_count_total
        - missing_count_numeric
        - missing_count_categorical
        - missing_count_very_high
      indicator_source_rule: Every v0 feature containing at least one missing value in the training data.
      indicator_feature_count: 184
      indicator_suffix: _is_missing

  - id: v3_targeted_missingness
    status: implemented_local
    path: data/processed/v3_targeted_missingness
    parent: v1_missingness_summary
    selection_source_experiment: xgboost_v2_missingness_indicators_cv5
    train_row_count: 10000
    test_row_count: 2500
    feature_count: 217
    expected_row_order_preservation: exact
    defining_transformations:
      type: additive_targeted_missingness_indicators
      indicator_source_features:
        - Var217
        - Var126
        - Var218
        - Var192
      added_features:
        - Var217_is_missing
        - Var126_is_missing
        - Var218_is_missing
        - Var192_is_missing

legacy_validation_protocols:
  standard_cv5_seed42:
    status: legacy
    splitter: StratifiedKFold
    folds: 5
    shuffle: true
    seed: 42
    default_threshold: 0.5
    global_oof_threshold_optimization:
      threshold_min: 0.01
      threshold_max: 0.99
      threshold_step: 0.001
      interpretation: optimistic
      reason: The threshold is selected and reported on the same OOF labels.
    cross_fitted_threshold_method:
      status: legacy_not_fully_nested
      interpretation: historical_comparison_only
      reason: Calibration OOF predictions may come from models trained on rows in the nominal holdout fold.

  manual_lightgbm_outer8_inner5:
    status: legacy_manual_reproduction
    outer_splitter: StratifiedKFold
    outer_folds: 8
    outer_shuffle: true
    outer_seed: 0
    inner_target_encoding_splitter: StratifiedKFold
    inner_target_encoding_folds: 5
    inner_target_encoding_shuffle: true
    target_encoding_seed: 42
    fixed_submission_threshold: 0.117
    boosting_rounds: 376

