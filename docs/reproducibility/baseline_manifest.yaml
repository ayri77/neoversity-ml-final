manual_lightgbm_contract:
  experiment_id: manual_lightgbmprep_r31_v3_reproduction
  source_notebook: notebooks/sandbox/experiments/02_reproduce_autogluon_lightgbm.ipynb
  dataset_version: v3_targeted_missingness
  validation_protocol: manual_lightgbm_outer8_inner5
  current_submission: submissions/manual_lightgbmprep_r31_threshold_0117.csv
  feature_contract:
    source_dataset_feature_count: 217
    dropped_features:
      - Var214
      - Var220
      - Var222
      - Var218_is_missing
    final_model_input_feature_count: 213
    categorical_feature_count: 31
    categorical_features:
      - Var192
      - Var193
      - Var194
      - Var195
      - Var196
      - Var197
      - Var198
      - Var199
      - Var200
      - Var201
      - Var202
      - Var203
      - Var204
      - Var205
      - Var206
      - Var207
      - Var208
      - Var210
      - Var211
      - Var212
      - Var216
      - Var217
      - Var218
      - Var219
      - Var221
      - Var223
      - Var225
      - Var226
      - Var227
      - Var228
      - Var229
  target_encoding_contract:
    implementation: custom_autogluon_compatible_binary_oof_target_encoder
    outer_fold_safe_fitting: true
    inner_folds: 5
    shuffle: true
    random_state: 42
    alpha: 10
    keep_original_categorical_features: false
    numerical_features: pass_through_unchanged
    training_encoding: inner_oof_values
    validation_and_test_encoding: mappings_fitted_on_complete_outer_training_fold
    missing_and_unseen_category_fallback: prior
    prior_definition: unweighted_mean_of_category_level_target_means
  lightgbm_parameters:
    n_estimators: 376
    learning_rate: 0.0397613094741
    num_leaves: 16
    min_data_in_leaf: 1
    feature_fraction: 0.5791844062459
    bagging_fraction: 0.9591526242875
    bagging_freq: 1
    lambda_l1: 0.938461750637
    lambda_l2: 0.9899852075056
    extra_trees: false
    min_data_per_group: 39
    max_cat_to_onehot: 27
    cat_l2: 1.8962346412823
    cat_smooth: 0.0215219089995
    seed: 0
  prediction_policy:
    outer_fold_model_count: 8
    independently_fitted_outer_fold_models: true
    test_probability_aggregation: arithmetic_mean_across_eight_outer_fold_models
    full_data_refit: false
    submission_threshold: 0.117
  current_parity_environment:
    python: "3.12.12"
    numpy: "2.4.6"
    pandas: "2.3.3"
    scikit_learn: "1.9.0"
    lightgbm: "4.7.0"
  known_implementation_difference: >-
    The manual reproduction omits AutoGluon ArithmeticFeatureGenerator and
    CategoricalInteractionFeatureGenerator, so it is a controlled simplified
    reproduction rather than a bit-exact reconstruction of LightGBMPrep_r31.
  primary_parity_requirements:
    submission_labels:
      expected: exact_match_to_current_saved_submission
      comparison: exact
    positive_prediction_count_at_0_117:
      expected: 569
      comparison: exact
    balanced_accuracy_at_0_117:
      expected: 0.900979
      absolute_tolerance: 0.000001
  secondary_diagnostic_requirements:
    global_optimized_oof_balanced_accuracy:
      expected_approximately: 0.904078
      absolute_tolerance: 0.000001
    global_optimized_threshold:
      expected_approximately: 0.096
      absolute_tolerance: 0.000001
    legacy_cross_fitted_balanced_accuracy:
      expected_approximately: 0.898656
      absolute_tolerance: 0.000001
  excluded_acceptance_tests:
    - Kaggle Public Score is externally observed and must not be used as a local automated acceptance test.

